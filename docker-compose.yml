version: '3.8'

services:
  # PostgreSQL Database with PostGIS Extension
  db:
    image: postgis/postgis:15-3.3
    container_name: civicfix-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-civicfix}
      POSTGRES_USER: ${POSTGRES_USER:-civicfix_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - civicfix-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-civicfix_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: civicfix-backend
    restart: unless-stopped
    environment:
      # Database Configuration
      DATABASE_URL: postgresql://${POSTGRES_USER:-civicfix_user}:${POSTGRES_PASSWORD:-changeme123}@db:5432/${POSTGRES_DB:-civicfix}
      
      # JWT Configuration
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      
      # Email Configuration (Optional)
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@civicfix.local}
      
      # Frontend URL (for emails)
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      
      # Application Settings
      ENVIRONMENT: ${ENVIRONMENT:-production}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/alembic:/app/alembic
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - civicfix-network
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        echo 'Running migrations...' &&
        alembic upgrade head &&
        echo 'Starting application...' &&
        uvicorn main:app --host 0.0.0.0 --port 8000 --reload
      "

  # React Frontend with Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8000}
    container_name: civicfix-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - civicfix-network

networks:
  civicfix-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
